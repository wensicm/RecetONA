<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RecetONA</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f2f8f0;
        --surface: #ffffff;
        --surface-strong: #f8fcf7;
        --ink: #1f2f24;
        --muted: #607167;
        --line: rgba(15, 121, 61, 0.14);
        --brand: #10833f;
        --brand-strong: #0b6c34;
        --brand-soft: rgba(16, 131, 63, 0.08);
        --accent: #f28a1a;
        --accent-strong: #db7300;
        --accent-soft: rgba(242, 138, 26, 0.12);
        --shadow: 0 18px 40px rgba(31, 70, 38, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          linear-gradient(
            180deg,
            rgba(16, 131, 63, 0.08) 0%,
            rgba(16, 131, 63, 0) 18%
          ),
          linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
        color: var(--ink);
        font:
          15px/1.5 "Avenir Next", "Segoe UI", "Helvetica Neue", Arial,
          sans-serif;
      }

      .shell {
        padding: 18px;
      }

      .panel {
        background: linear-gradient(180deg, #ffffff 0%, var(--surface-strong) 100%);
        border: 1px solid var(--line);
        border-radius: 22px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .hero {
        position: relative;
        padding: 20px 20px 16px;
        border-bottom: 1px solid var(--line);
        background:
          linear-gradient(
            180deg,
            rgba(16, 131, 63, 0.05) 0%,
            rgba(255, 255, 255, 0) 100%
          ),
          #ffffff;
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 10px;
        background: linear-gradient(
          90deg,
          var(--brand) 0 84%,
          var(--accent) 84% 100%
        );
      }

      .eyebrow {
        margin: 10px 0 8px;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--brand);
      }

      h1 {
        margin: 0;
        font-size: 34px;
        line-height: 1.06;
        letter-spacing: -0.03em;
      }

      .stats {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        padding: 14px 20px 0;
      }

      .stat {
        position: relative;
        padding: 12px 14px;
        border-radius: 16px;
        background: var(--surface);
        border: 1px solid var(--line);
        box-shadow: 0 8px 20px rgba(12, 80, 37, 0.04);
      }

      .stat::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 4px;
        border-radius: 16px 16px 0 0;
        background: var(--brand);
      }

      .stat:nth-child(3)::before,
      .stat:nth-child(4)::before {
        background: var(--accent);
      }

      .stat-label {
        margin: 0;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .stat-value {
        margin: 4px 0 0;
        font-size: 22px;
        line-height: 1.1;
        color: var(--brand-strong);
      }

      .stat:nth-child(3) .stat-value,
      .stat:nth-child(4) .stat-value {
        color: var(--accent-strong);
      }

      .content {
        display: grid;
        gap: 18px;
        padding: 18px;
      }

      .section {
        padding: 16px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.96);
      }

      .section h2 {
        margin: 0 0 12px;
        font-size: 18px;
        line-height: 1.2;
        color: var(--ink);
      }

      .ingredient-list,
      .step-list {
        display: grid;
        gap: 10px;
      }

      .ingredient-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        align-items: start;
      }

      .ingredient-card {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 12px;
        padding: 12px 14px;
        border-radius: 16px;
        border: 1px solid var(--line);
        border-left: 5px solid var(--brand);
        background:
          linear-gradient(
            90deg,
            rgba(16, 131, 63, 0.05) 0%,
            rgba(255, 255, 255, 0) 34%
          ),
          #ffffff;
      }

      .ingredient-card.with-image {
        grid-template-columns: minmax(0, 1fr) 88px;
        align-items: center;
      }

      .ingredient-copy {
        min-width: 0;
      }

      .ingredient-name {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
        font-weight: 700;
      }

      .ingredient-meta {
        margin: 8px 0 0;
        color: var(--muted);
        font-weight: 500;
      }

      .ingredient-media {
        width: 88px;
        height: 88px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: linear-gradient(
          180deg,
          rgba(16, 131, 63, 0.08) 0%,
          rgba(255, 255, 255, 0.96) 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .ingredient-image {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      .step {
        display: grid;
        grid-template-columns: 34px 1fr;
        gap: 12px;
        align-items: start;
      }

      .step-index {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        border-radius: 999px;
        background: linear-gradient(
          180deg,
          var(--brand) 0%,
          var(--brand-strong) 100%
        );
        color: #fff;
        font-weight: 700;
        box-shadow: 0 8px 16px rgba(16, 131, 63, 0.18);
      }

      .step-text {
        margin: 0;
        padding-top: 4px;
        color: var(--ink);
      }

      .empty {
        margin: 0;
        color: var(--muted);
      }

      @media (max-width: 560px) {
        .ingredient-list {
          grid-template-columns: 1fr;
        }

        .ingredient-card.with-image {
          grid-template-columns: minmax(0, 1fr) 72px;
        }

        .ingredient-media {
          width: 72px;
          height: 72px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <article class="panel">
        <header class="hero">
          <p class="eyebrow">RecetONA</p>
          <h1 id="question">Preparando receta...</h1>
          <div class="stats">
            <div class="stat">
              <p class="stat-label">Productos exactos</p>
              <p class="stat-value" id="product-count">-</p>
            </div>
            <div class="stat">
              <p class="stat-label">Personas</p>
              <p class="stat-value" id="servings">-</p>
            </div>
            <div class="stat">
              <p class="stat-label">Coste total</p>
              <p class="stat-value" id="total-cost">-</p>
            </div>
            <div class="stat">
              <p class="stat-label">Calorías receta</p>
              <p class="stat-value" id="total-calories">-</p>
            </div>
          </div>
        </header>

        <div class="content">
          <section class="section">
            <h2>Lista de la compra</h2>
            <div id="ingredients" class="ingredient-list"></div>
          </section>

          <section class="section">
            <h2>Pasos</h2>
            <div id="steps" class="step-list"></div>
          </section>
        </div>
      </article>
    </div>

    <script>
      const questionEl = document.getElementById("question");
      const productCountEl = document.getElementById("product-count");
      const servingsEl = document.getElementById("servings");
      const totalCostEl = document.getElementById("total-cost");
      const totalCaloriesEl = document.getElementById("total-calories");
      const ingredientsEl = document.getElementById("ingredients");
      const stepsEl = document.getElementById("steps");
      let hydrationTimer = null;
      let hydrationAttempts = 0;
      const MAX_HYDRATION_ATTEMPTS = 24;
      const HYDRATION_INTERVAL_MS = 250;

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatMoney(value) {
        if (
          value === null ||
          value === undefined ||
          Number.isNaN(Number(value))
        ) {
          return "N/D";
        }
        return new Intl.NumberFormat(
          document.documentElement.lang || "es-ES",
          {
            style: "currency",
            currency: "EUR",
          }
        ).format(Number(value));
      }

      function formatCount(value) {
        if (
          value === null ||
          value === undefined ||
          Number.isNaN(Number(value))
        ) {
          return null;
        }
        const number = Number(value);
        return Number.isInteger(number)
          ? String(number)
          : number.toFixed(2).replace(/0+$/, "").replace(/\.$/, "");
      }

      function formatCalories(value) {
        if (
          value === null ||
          value === undefined ||
          Number.isNaN(Number(value))
        ) {
          return "N/D";
        }
        return (
          new Intl.NumberFormat(
            document.documentElement.lang || "es-ES"
          ).format(Math.round(Number(value))) + " kcal"
        );
      }

      function buildIngredientMeta(item) {
        const parts = [];
        const unitsText = formatCount(
          item.envases_a_comprar ??
            item.cantidad_receta_valor ??
            null
        );
        if (unitsText) {
          parts.push(unitsText + " ud");
        }
        if (
          item.coste_compra_eur !== null &&
          item.coste_compra_eur !== undefined
        ) {
          parts.push("Total " + formatMoney(item.coste_compra_eur));
        }
        return parts.join(" · ");
      }

      function splitSteps(text) {
        const cleanText = String(text ?? "").trim();
        if (!cleanText) {
          return [];
        }
        return cleanText
          .split(/(?<=[.!?])\s+/)
          .map((part) =>
            part
              .trim()
              .replace(
                /^(?:paso\s*)?\d+\s*(?:[).:\-]|[-–—])\s*/i,
                ""
              )
              .trim()
          )
          .filter(Boolean);
      }

      function getToolData() {
        return window.openai?.toolOutput || {};
      }

      function normalizePayload(result) {
        if (!result || typeof result !== "object") {
          return {};
        }
        if (
          result.structuredContent &&
          typeof result.structuredContent === "object"
        ) {
          return result.structuredContent;
        }
        return result;
      }

      function hasRenderableRecipeData(payload) {
        if (!payload || typeof payload !== "object") {
          return false;
        }
        if (
          Array.isArray(payload.ingredientes_mercadona) &&
          payload.ingredientes_mercadona.length > 0
        ) {
          return true;
        }
        return Boolean(
          String(payload.receta_y_pasos_texto_literal ?? "").trim()
        );
      }

      function formatQuestionTitle(value) {
        const text = String(value ?? "").trim();
        if (!text) {
          return "Receta disponible";
        }
        return text.charAt(0).toUpperCase() + text.slice(1);
      }

      function renderIngredients(items) {
        if (!Array.isArray(items) || items.length === 0) {
          ingredientsEl.innerHTML =
            '<p class="empty">No hay ingredientes estructurados.</p>';
          return;
        }

        ingredientsEl.innerHTML = items
          .map((item) => {
            const imageUrl = String(item.imagen_url || "").trim();
            const hasImage = Boolean(imageUrl);
            return `
              <article class="ingredient-card${hasImage ? " with-image" : ""}">
                <div class="ingredient-copy">
                  <p class="ingredient-name">${escapeHtml(item.producto_mercadona || "Producto sin nombre")}</p>
                  <p class="ingredient-meta">${escapeHtml(buildIngredientMeta(item) || "Sin detalle de coste")}</p>
                </div>
                ${
                  hasImage
                    ? `<div class="ingredient-media" aria-hidden="true"><img class="ingredient-image" src="${escapeHtml(imageUrl)}" alt="" loading="lazy" /></div>`
                    : ""
                }
              </article>
            `;
          })
          .join("");
      }

      function renderSteps(text) {
        const steps = splitSteps(text);
        if (steps.length === 0) {
          stepsEl.innerHTML =
            '<p class="empty">No hay pasos disponibles.</p>';
          return;
        }

        stepsEl.innerHTML = steps
          .map((step, index) => {
            return `
              <div class="step">
                <span class="step-index">${index + 1}</span>
                <p class="step-text">${escapeHtml(step)}</p>
              </div>
            `;
          })
          .join("");
      }

      function render(data) {
        const payload = normalizePayload(data);
        const ingredients = Array.isArray(payload.ingredientes_mercadona)
          ? payload.ingredientes_mercadona
          : [];

        questionEl.textContent = formatQuestionTitle(payload.pregunta);
        productCountEl.textContent = String(
          Array.isArray(payload.productos_mercadona_exactos)
            ? payload.productos_mercadona_exactos.length
            : ingredients.length
        );
        servingsEl.textContent = payload.personas || "-";
        totalCostEl.textContent = formatMoney(
          payload.coste_total_compra_eur
        );
        totalCaloriesEl.textContent = formatCalories(
          payload.calorias_totales_kcal
        );

        renderIngredients(ingredients);
        renderSteps(payload.receta_y_pasos_texto_literal);
      }

      function handleToolResult(result) {
        render(normalizePayload(result));
      }

      function stopHydrationRetries() {
        if (hydrationTimer) {
          window.clearTimeout(hydrationTimer);
          hydrationTimer = null;
        }
      }

      function scheduleHydrationRetry() {
        stopHydrationRetries();
        hydrationTimer = window.setTimeout(() => {
          hydrationAttempts += 1;
          const payload = normalizePayload(getToolData());
          if (
            hasRenderableRecipeData(payload) ||
            hydrationAttempts >= MAX_HYDRATION_ATTEMPTS
          ) {
            render(payload);
            stopHydrationRetries();
            return;
          }
          render(payload);
          scheduleHydrationRetry();
        }, HYDRATION_INTERVAL_MS);
      }

      function hydrateFromHost() {
        const payload = normalizePayload(getToolData());
        render(payload);
        hydrationAttempts = 0;
        if (!hasRenderableRecipeData(payload)) {
          scheduleHydrationRetry();
          return;
        }
        stopHydrationRetries();
      }

      window.addEventListener(
        "message",
        (event) => {
          if (event.source !== window.parent) {
            return;
          }
          const message = event.data;
          if (!message || message.jsonrpc !== "2.0") {
            return;
          }
          if (message.method !== "ui/notifications/tool-result") {
            return;
          }
          stopHydrationRetries();
          handleToolResult(message.params);
        },
        { passive: true }
      );

      window.addEventListener(
        "openai:set_globals",
        (event) => {
          stopHydrationRetries();
          handleToolResult(
            event.detail?.globals?.toolOutput || getToolData()
          );
        },
        { passive: true }
      );

      window.addEventListener("focus", hydrateFromHost, {
        passive: true,
      });
      window.addEventListener("pageshow", hydrateFromHost, {
        passive: true,
      });
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          hydrateFromHost();
        }
      });

      hydrateFromHost();
    </script>
  </body>
</html>
